name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Select the Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    name: "Terraform ${{ github.event.inputs.action }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra
    env:
      ACCESS_KEY: ${{ secrets.YC_ACCESS_KEY }}
      SECRET_KEY: ${{ secrets.YC_SECRET_KEY }}
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      YC_SERVICE_ACCOUNT_KEY_FILE: ./yc_key.json
    

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup YC
        run: curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash

      - name: Create YC service account key file
        run: |
          echo "${{ secrets.YC_SERVICE_ACCOUNT_KEY }}" > $YC_SERVICE_ACCOUNT_KEY_FILE

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.7

      - name: Configure Terraform CLI
        run: |
          cat > ~/.terraformrc << EOF
          provider_installation {
            network_mirror {
              url = "https://terraform-mirror.yandexcloud.net/"
              include = ["registry.terraform.io/*/*"]
            }
            direct {
              exclude = ["registry.terraform.io/*/*"]
            }
          }
          EOF

      - name: Remove existing lock file
        run: rm -f .terraform.lock.hcl

      - name: Create environment file
        run: |
          cat > terraform.tfvars << EOF
          zone           = "${{secrets.YC_ZONE }}"
          folder_id      = "${{secrets.YC_FOLDER_ID }}"
          catalog_name   = "${{secrets.YC_CATALOG_NAME }}"
          image_id       = "${{secrets.YC_IMAGE_ID }}"
          ssh_public_key = <<-EOT
          ${{ secrets.PUBLIC_SSH_KEY }}
          EOT
          vm_user        = "${{secrets.YC_VM_USER }}"
          EOF

      - name: Terraform init
        run: terraform init -backend-config="access_key=$ACCESS_KEY" -backend-config="secret_key=$SECRET_KEY"

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'plan' }}
        run: terraform plan

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve
